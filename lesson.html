<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Урок | Learn C++ RU</title>
    <meta
      name="description"
      content="Страница урока Learn C++ RU с подсказками оригинального текста."
    />
    <script>
      (() => {
        try {
          const key = "learncpp-theme";
          const saved = localStorage.getItem(key);
          const theme =
            saved === "dark" || saved === "light"
              ? saved
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (error) {
          // Theme falls back to the stylesheet defaults.
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
